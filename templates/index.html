<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>flatballstats</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --text:          hsl(230, 30%, 5%);
        --text-muted:    hsl(230, 20%, 40%);

        --bg:            hsl(220, 20%, 95%);
        --bg-dark:       hsl(220, 20%, 90%);
        --bg-light:      hsl(220, 20%, 99%);
        --border:        hsl(220, 20%, 80%);
        --border-2:      hsl(220, 20%, 65%);

        --blue:          hsl(220, 80%, 60%);
        --blue-dim:      hsl(220, 80%, 85%);
        --orange:        hsl(30,  90%, 70%);
        --orange-dim:    hsl(30,  90%, 92%);
        --green:         hsl(140, 80%, 50%);
        --green-dark:    hsl(140, 80%, 40%);
        --red:           hsl(10,  80%, 50%);
        --purple:        hsl(290, 90%, 70%);

        --warn-bg:       hsl(30,  90%, 96%);
        --warn-border:   hsl(30,  80%, 75%);
        --warn-text:     hsl(30,  60%, 35%);
        --err-bg:        hsl(10,  70%, 97%);
        --err-border:    hsl(10,  70%, 85%);
        --blue-hover:    hsl(220, 80%, 50%);

        --sans:   'Inter', sans-serif;
        --gutter: 0.5rem;
    }

    body {
        background:  var(--bg);
        color:       var(--text);
        font-family: var(--sans);
        min-height:  100vh;
        line-height: 1.6;
    }

    /* ── header ── */
    .page-header {
        display:         flex;
        align-items:     center;
        justify-content: space-between;
        padding:         1.2rem var(--gutter);
        border-bottom:   1px solid var(--border);
        background:      var(--bg-light);
        position:        sticky;
        top:             0;
        z-index:         100;
    }

    .logo {
        font-size:      1.05rem;
        font-weight:    700;
        color:          var(--orange);
        letter-spacing: .05em;
    }

    .logo span {
        color:       var(--text-muted);
        font-weight: 400;
    }

    .header-sub {
        font-size:      .8rem;
        color:          var(--text-muted);
        letter-spacing: .08em;
    }

    /* ── upload ── */
    .upload-strip {
        background:    var(--bg-light);
        border-bottom: 1px solid var(--border);
        padding:       .85rem var(--gutter);
        display:       flex;
        align-items:   center;
        gap:           1rem;
        flex-wrap:     wrap;
    }

    .upload-btn {
        position:       relative;
        display:        inline-flex;
        align-items:    center;
        gap:            .5rem;
        font-size:      .85rem;
        font-weight:    600;
        letter-spacing: .04em;
        color:          var(--blue);
        border:         1px solid var(--blue);
        background:     transparent;
        padding:        .45rem 1.1rem;
        cursor:         pointer;
        transition:     background .15s;
        white-space:    nowrap;
        flex-shrink:    0;
    }

    .upload-btn:hover {
        background: var(--blue-dim);
    }

    .upload-btn input[type="file"] {
        position: absolute;
        inset:    0;
        opacity:  0;
        cursor:   pointer;
        width:    100%;
        height:   100%;
    }

    .upload-send-btn {
        font-size:      .85rem;
        font-weight:    600;
        letter-spacing: .04em;
        color:          var(--bg-light);
        background:     var(--blue);
        border:         none;
        padding:        .45rem 1.3rem;
        cursor:         pointer;
        transition:     background .15s;
        flex-shrink:    0;
    }

    .upload-send-btn:hover {
        background: var(--blue-hover);
    }

    .upload-success {
        font-size: .8rem;
        font-weight: 600;
        color: var(--green-dark);
        white-space: nowrap;
    }

    /* ── htmx ── */
    .htmx-indicator {
        display: none;
    }

    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator {
        display: block;
    }

    /* ── layout ── */
    main {
        padding: var(--gutter);
    }

    #workspace {
        display: contents;
    }

    .workspace {
        display:               grid;
        grid-template-columns: 200px 1fr;
        gap:                   var(--gutter);
        align-items:           start;
    }

    /* ── warnings ── */
    .warnings-block {
        background:     var(--warn-bg);
        border:         1px solid var(--warn-border);
        padding:        1rem 1.25rem;
        margin-bottom:  var(--gutter);
    }

    .warn-title {
        font-size:      .82rem;
        font-weight:    700;
        color:          var(--orange);
        letter-spacing: .08em;
        margin-bottom:  .5rem;
    }

    .warn-list {
        list-style:     none;
        display:        flex;
        flex-direction: column;
        gap:            .25rem;
    }

    .warn-list li {
        font-size: .82rem;
        color:     var(--warn-text);
    }

    /* ── sidebar ── */
    .selector-panel {
        background:  var(--bg-light);
        border:      1px solid var(--border);
        padding:     .75rem;
        position:    sticky;
        top:         calc(56px + var(--gutter));
        max-height:  calc(100vh - 100px);
        overflow-y:  auto;
    }

    .selector-divider {
        border-top: 1px solid var(--border);
        margin:     .4rem 0;
    }

    .selector-label {
        display:        block;
        font-size:      .72rem;
        font-weight:    700;
        letter-spacing: .1em;
        text-transform: uppercase;
        color:          var(--text-muted);
        padding:        .5rem .4rem .35rem;
    }

    .selector-group {
        display:        flex;
        flex-direction: column;
        gap:            2px;
    }

    .selector-btn {
        width:           100%;
        text-align:      left;
        font-size:       .82rem;
        background:      transparent;
        color:           var(--text-muted);
        border:          1px solid transparent;
        padding:         .38rem .6rem;
        cursor:          pointer;
        transition:      background .12s, border-color .12s, color .12s;
        white-space:     nowrap;
        overflow:        hidden;
        text-overflow:   ellipsis;
    }

    .selector-btn:hover {
        background:   var(--bg-dark);
        border-color: var(--border-2);
        color:        var(--text);
    }

    .selector-btn.active {
        background:   var(--blue-dim);
        border-color: var(--blue);
        color:        var(--blue);
    }

    /* ── games bar ── */
    .team-bar {
        display:       flex;
        flex-wrap:     wrap;
        gap:           .4rem;
        padding:       .6rem .7rem;
        background:    var(--bg-light);
        border:        1px solid var(--border);
        margin-bottom: var(--gutter);
    }

    .team-bar .selector-btn {
        width: auto;
    }

    .chart-title {
        background:    var(--bg-light);
        border:        1px solid var(--border);
        padding:       1rem;
        margin-bottom: var(--gutter);
        font-weight:   700;
    }

    .chart-section {
        min-height: 300px;
        overflow-x: auto;
    }

    #chart-area {
        min-height: 200px;
        position:   relative;
    }

    .charts {
        display: flex;
        flex-direction: column;
        gap: var(--gutter);
    }

    .chart-wrapper {
        background: var(--bg-light);
        border:     1px solid var(--border);
        overflow:   hidden;
    }

    .stats {
        background:    var(--bg-light);
        border:        1px solid var(--border);
        padding:       1rem;
        margin-bottom: var(--gutter);
        display:       flex;
    }

    .loading-pulse {
        font-size:  .88rem;
        color:      var(--text-muted);
        padding:    3rem 0;
        text-align: center;
        animation:  pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: .3; }
        50%       { opacity: 1;  }
    }

    .error-msg {
        font-size:   .85rem;
        color:       var(--red);
        padding:     1.5rem;
        white-space: pre-wrap;
        border:      1px solid var(--err-border);
        background:  var(--err-bg);
    }

    .empty-state {
        display:         flex;
        flex-direction:  column;
        align-items:     center;
        justify-content: center;
        padding:         5rem 2rem;
        gap:             1rem;
        text-align:      center;
    }

    .empty-state-icon {
        font-size: 2.5rem;
        opacity:   .2;
    }

    .empty-state-title {
        font-size:      .95rem;
        font-weight:    700;
        color:          var(--text-muted);
        letter-spacing: .06em;
    }

    .empty-state-sub {
        font-size:  .88rem;
        color:      var(--text-muted);
        max-width:  340px;
    }

    .loading-overlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    }

    .htmx-request .loading-overlay,
    .htmx-request.loading-overlay {
        display: flex;
    }

    .spinner {
        width: 60px;
        height: 60px;
        border: 5px solid var(--border);
        border-top: 5px solid var(--blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* ── scrollbar ── */
    ::-webkit-scrollbar {
        width:  4px;
        height: 4px;
    }

    ::-webkit-scrollbar-track {
        background: transparent;
    }

    ::-webkit-scrollbar-thumb {
        background:    var(--border-2);
        border-radius: 2px;
    }
</style>
</head>
<body>

<header class="page-header">
    <div class="logo">flatball<span>stats</span></div>
    <div class="header-sub">version 1.0.0</div>
</header>

<form
  class="upload-strip"
  hx-post="/upload"
  hx-target="#workspace"
  hx-swap="innerHTML"
  hx-encoding="multipart/form-data"
  hx-indicator="#upload-indicator"
  hx-trigger="change from:input[type='file']">

  <label class="upload-btn">
    UPLOAD FILES
    <input type="file" name="files" multiple accept=".csv" />
  </label>

  <div id="upload-status"></div>

  <div id="upload-indicator" class="htmx-indicator loading-overlay">
    <div class="spinner"></div>
  </div>
</form>

<main>
  <div id="workspace">
      <div class="empty-state">
        <div class="empty-state-title">NO DATA LOADED</div>
        <div class="empty-state-sub">Upload your CSV exports above.</div>
      </div>
  </div>
</main>

</body>
</html>
